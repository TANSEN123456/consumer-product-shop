<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Consumer Product Shop</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search{
padding:8px;
width:200px;
}

.cart{
background:#ff6600;
padding:8px 15px;
border-radius:5px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:180px;
object-fit:cover;
}

.price{
color:green;
font-size:18px;
}

button{
background:#ff6600;
color:white;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#ff4500;
}

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
margin-top:20px;
}

</style>

</head>

<body>

<header>

<div class="logo">Consumer Product Shop</div>

<input class="search" placeholder="Search product...">

<div class="cart">
Cart: <span id="cart-count">0</span>
</div>

</header>


<div class="products">

<div class="product">
<img src="https://picsum.photos/200?1">
<h3>Smart Watch</h3>
<p class="price">$50</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="product">
<img src="https://picsum.photos/200?2">
<h3>Wireless Headphone</h3>
<p class="price">$70</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="product">
<img src="https://picsum.photos/200?3">
<h3>Bluetooth Speaker</h3>
<p class="price">$40</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="product">
<img src="https://picsum.photos/200?4">
<h3>Gaming Mouse</h3>
<p class="price">$25</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="product">
<img src="https://picsum.photos/200?5">
<h3>Keyboard</h3>
<p class="price">$30</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="product">
<img src="https://picsum.photos/200?6">
<h3>Power Bank</h3>
<p class="price">$20</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

</div>


<footer>
© 2026 Consumer Product Shop
</footer>


<script>

let cart = 0;

function addToCart(){

cart++;

document.getElementById("cart-count").innerText = cart;

alert("Product added to cart!");

}

</script>

</body>
</html>
